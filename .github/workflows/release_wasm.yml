name: Release wasm

on:
  push:
    branches:
      - main
    paths:
      - wasm/kaiki_diff_wasm/package.json

permissions: {}

concurrency:
  group: release_wasm
  cancel-in-progress: false

jobs:
  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.check.outputs.version }}
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/check-version
        id: check
        with:
          package-json-path: wasm/kaiki_diff_wasm/package.json

  publish-wasm:
    name: Build and Publish wasm
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          save-if: ${{ github.ref_name == 'main' }}
      - name: Install binaryen
        run: |
          curl -fsSL https://github.com/WebAssembly/binaryen/releases/download/version_126/binaryen-version_126-x86_64-linux.tar.gz | tar xz -C /tmp
          echo "/tmp/binaryen-version_126/bin" >> "$GITHUB_PATH"

      - name: Build wasm
        run: |
          cargo build --target wasm32-unknown-unknown --release -p kaiki_diff_wasm
          cargo install wasm-bindgen-cli@0.2.114
          wasm-bindgen --target web --out-dir wasm/kaiki_diff_wasm/pkg target/wasm32-unknown-unknown/release/kaiki_diff_wasm.wasm
          wasm-opt --all-features -O -o wasm/kaiki_diff_wasm/pkg/kaiki_diff_wasm_bg.wasm wasm/kaiki_diff_wasm/pkg/kaiki_diff_wasm_bg.wasm

      - name: Patch package.json
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          cd wasm/kaiki_diff_wasm/pkg
          node -e "
            const pkg = require('./package.json');
            pkg.name = '@kaiki/diff-wasm';
            pkg.version = '${VERSION}';
            pkg.license = 'MIT';
            pkg.repository = { type: 'git', url: 'https://github.com/re-taro/kaiki' };
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

      - name: Publish
        working-directory: wasm/kaiki_diff_wasm/pkg
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: wasm-v${{ needs.check-version.outputs.version }}
          name: wasm v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
