name: Release CLI

on:
  push:
    branches:
      - main
    paths:
      - npm/kaiki/package.json

permissions: {}

concurrency:
  group: release_cli
  cancel-in-progress: false

jobs:
  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.check.outputs.version }}
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/check-version
        id: check
        with:
          package-json-path: npm/kaiki/package.json

  build-cli:
    name: Build CLI (${{ matrix.target }})
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
            npm-package: "@kaiki/cli-darwin-arm64"
            npm-os: darwin
            npm-cpu: arm64
            cross: false
          - target: x86_64-apple-darwin
            os: macos-13
            npm-package: "@kaiki/cli-darwin-x64"
            npm-os: darwin
            npm-cpu: x64
            cross: false
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            npm-package: "@kaiki/cli-linux-x64-gnu"
            npm-os: linux
            npm-cpu: x64
            npm-libc: glibc
            cross: false
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            npm-package: "@kaiki/cli-linux-arm64-gnu"
            npm-os: linux
            npm-cpu: arm64
            npm-libc: glibc
            cross: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            npm-package: "@kaiki/cli-linux-x64-musl"
            npm-os: linux
            npm-cpu: x64
            npm-libc: musl
            cross: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            npm-package: "@kaiki/cli-linux-arm64-musl"
            npm-os: linux
            npm-cpu: arm64
            npm-libc: musl
            cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            npm-package: "@kaiki/cli-win32-x64-msvc"
            npm-os: win32
            npm-cpu: x64
            cross: false
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            npm-package: "@kaiki/cli-win32-arm64-msvc"
            npm-os: win32
            npm-cpu: arm64
            cross: false
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2
        with:
          save-if: ${{ github.ref_name == 'main' }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }} -p kaiki_cli
          else
            cargo build --release --target ${{ matrix.target }} -p kaiki_cli
          fi
        shell: bash

      - name: Generate platform package
        shell: node {0}
        run: |
          const fs = require("fs");
          const path = require("path");

          const version = "${{ needs.check-version.outputs.version }}";
          const npmPackage = "${{ matrix.npm-package }}";
          const npmOs = "${{ matrix.npm-os }}";
          const npmCpu = "${{ matrix.npm-cpu }}";
          const npmLibc = "${{ matrix.npm-libc }}";
          const target = "${{ matrix.target }}";

          const dir = path.join("staging", npmPackage.replace("/", "-").replace("@", ""));
          fs.mkdirSync(dir, { recursive: true });

          const binaryName = npmOs === "win32" ? "kaiki.exe" : "kaiki";
          const binarySource = path.join("target", target, "release", binaryName);
          fs.copyFileSync(binarySource, path.join(dir, binaryName));

          const pkg = {
            name: npmPackage,
            version,
            description: `kaiki CLI binary for ${target}`,
            license: "MIT",
            repository: { type: "git", url: "https://github.com/re-taro/kaiki" },
            os: [npmOs],
            cpu: [npmCpu],
            files: [binaryName],
          };

          if (npmLibc) {
            pkg.libc = [npmLibc];
          }

          fs.writeFileSync(path.join(dir, "package.json"), JSON.stringify(pkg, null, 2) + "\n");

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: cli-${{ matrix.target }}
          path: staging/
          if-no-files-found: error

  publish-cli:
    name: Publish CLI
    needs: [check-version, build-cli]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          path: artifacts
          pattern: cli-*
          merge-multiple: true

      - name: Publish platform packages
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in artifacts/*/; do
            if [ -f "$dir/package.json" ]; then
              echo "Publishing $(jq -r .name "$dir/package.json")..."
              npm publish "$dir" --provenance --access public
            fi
          done

      - name: Update and publish main package
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          cd npm/kaiki

          # Update optionalDependencies versions
          node -e "
            const pkg = require('./package.json');
            pkg.version = '${VERSION}';
            for (const dep of Object.keys(pkg.optionalDependencies || {})) {
              pkg.optionalDependencies[dep] = '${VERSION}';
            }
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          npm publish --provenance --access public

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2
        with:
          tag_name: cli-v${{ needs.check-version.outputs.version }}
          name: CLI v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
