name: Release napi

on:
  push:
    branches:
      - main
    paths:
      - napi/kaiki/package.json

permissions: {}

concurrency:
  group: release_napi
  cancel-in-progress: false

jobs:
  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      version: ${{ steps.check.outputs.version }}
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/check-version
        id: check
        with:
          package-json-path: napi/kaiki/package.json

  build-napi:
    name: Build napi (${{ matrix.target }})
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: aarch64-pc-windows-msvc
            os: windows-latest
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - uses: dtolnay/rust-toolchain@086dfa4efe372cfb6b375460a56e26a62a873d2e # 1.93.1
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          save-if: false

      - name: Install cross-compilation tools (aarch64-linux-gnu)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install cross-compilation tools (x86_64-linux-musl)
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install cross-compilation tools (aarch64-linux-musl)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          # Download musl cross compiler
          curl -fsSL https://musl.cc/aarch64-linux-musl-cross.tgz | tar xz -C /tmp
          echo "/tmp/aarch64-linux-musl-cross/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        working-directory: napi/kaiki
        run: pnpm install --frozen-lockfile

      - name: Build napi
        working-directory: napi/kaiki
        shell: bash
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: aarch64-linux-musl-gcc
          BUILD_TARGET: ${{ matrix.target }}
        run: pnpm exec napi build --platform --release --target "$BUILD_TARGET"

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: napi-${{ matrix.target }}
          path: napi/kaiki/*.node
          if-no-files-found: error

  publish-napi:
    name: Publish napi
    needs: [check-version, build-napi]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false
      - uses: ./.github/actions/setup
      - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
        with:
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        working-directory: napi/kaiki
        run: pnpm install --frozen-lockfile

      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: napi/kaiki/artifacts
          pattern: napi-*
          merge-multiple: true

      - name: Move artifacts
        working-directory: napi/kaiki
        run: pnpm exec napi artifacts

      - name: Prepublish
        working-directory: napi/kaiki
        run: pnpm exec napi prepublish -t npm

      - name: Publish platform packages
        working-directory: napi/kaiki
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for dir in npm/*/; do
            if [ -f "$dir/package.json" ]; then
              echo "Publishing $(jq -r .name "$dir/package.json")..."
              pnpm publish "$dir" --provenance --access public --no-git-checks
            fi
          done

      - name: Update and publish main package
        working-directory: napi/kaiki
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          node -e "
            const pkg = require('./package.json');
            pkg.version = process.env.VERSION;
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "
          pnpm publish --provenance --access public --no-git-checks

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: napi-v${{ needs.check-version.outputs.version }}
          name: napi v${{ needs.check-version.outputs.version }}
          generate_release_notes: true
