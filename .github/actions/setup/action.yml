name: setup
description: setup

inputs:
  working-directory:
    required: false
    description: The working directory to run commands in
    default: .

runs:
  using: composite
  steps:
    - id: paths
      shell: bash
      run: |
        set -euo pipefail

        wd="${WORKING_DIRECTORY}"

        # normalize working-directory
        wd="${wd%/}"        # remove trailing /
        if [ "$wd" = "." ]; then
          wd=""
        fi
        wd="${wd#./}"       # remove leading ./

        if [ -n "$wd" ]; then
          tool_versions="$wd/.tool-versions"
          package_json="$wd/package.json"
        else
          tool_versions=".tool-versions"
          package_json="package.json"
        fi

        {
          echo "tool_versions_path=$tool_versions"
          echo "package_json_path=$package_json"
        } >> "$GITHUB_OUTPUT"
      env:
        WORKING_DIRECTORY: ${{ inputs.working-directory }}
    - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
      with:
        package_json_file: ${{ steps.paths.outputs.package_json_path }}
    - uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
      with:
        node-version-file: ${{ steps.paths.outputs.tool_versions_path }}
